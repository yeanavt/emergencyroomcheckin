<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Linked List Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --surface: #161b24;
    --surface2: #1e2533;
    --border: #2a3245;
    --text: #e4e8f1;
    --text-dim: #7a8499;
    --accent: #ff6b6b;
    --accent-glow: rgba(255, 107, 107, 0.25);
    --green: #4ecdc4;
    --green-glow: rgba(78, 205, 196, 0.2);
    --yellow: #ffe66d;
    --blue: #6c9bff;
    --orange: #ffa64d;
    --purple: #b47aff;
    --null-color: #555e73;
    --arrow-color: #4a5568;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  /* Step Navigation */
  .step-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .step-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .step-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--surface2);
  }

  .step-btn.active {
    border-color: var(--accent);
    background: rgba(255, 107, 107, 0.1);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .nav-arrows {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    justify-content: center;
  }

  .arrow-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.55rem 1.3rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .arrow-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--surface2);
    box-shadow: 0 0 10px var(--green-glow);
  }

  .arrow-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Code call display */
  .code-call {
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    margin-bottom: 1rem;
    padding: 0.8rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--green);
  }

  .code-call .keyword { color: var(--purple); }
  .code-call .str { color: var(--yellow); }
  .code-call .num { color: var(--orange); }
  .code-call .comment { color: var(--text-dim); font-style: italic; }

  /* Description */
  .description {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-bottom: 2rem;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }

  .description .highlight {
    color: var(--accent);
    font-weight: 600;
  }

  .description .name-hl {
    color: var(--yellow);
    font-weight: 600;
  }

  .description .pain-hl {
    color: var(--orange);
    font-weight: 600;
  }

  /* Linked List Visualization */
  .list-area {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0;
    padding: 2rem 1rem;
    overflow-x: auto;
    min-height: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .head-label {
    position: absolute;
    top: 10px;
    left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    background: rgba(78, 205, 196, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(78, 205, 196, 0.25);
  }

  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: nodeAppear 0.5s ease-out;
    flex-shrink: 0;
  }

  @keyframes nodeAppear {
    from { opacity: 0; transform: translateY(-20px) scale(0.85); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes newNodeGlow {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 25px 5px var(--accent-glow); }
    100% { box-shadow: 0 0 8px 2px transparent; }
  }

  .node-box {
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    padding: 0;
    min-width: 120px;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .node-box.new-node {
    border-color: var(--accent);
    animation: newNodeGlow 1.5s ease-out;
  }

  .node-box.head-node {
    border-color: var(--green);
  }

  .node-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 0.6rem 0.8rem 0.2rem;
    text-align: center;
    color: var(--text);
  }

  .node-pain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.15rem 0.8rem 0.5rem;
    text-align: center;
    color: var(--text-dim);
  }

  .node-pain span {
    font-weight: 700;
    font-size: 0.9rem;
  }

  .pain-1, .pain-2 { color: var(--blue); }
  .pain-3, .pain-4 { color: var(--green); }
  .pain-5, .pain-6 { color: var(--yellow); }
  .pain-7, .pain-8 { color: var(--orange); }
  .pain-9, .pain-10 { color: var(--accent); }

  .node-fields {
    display: flex;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
  }

  .field {
    flex: 1;
    padding: 0.35rem 0.4rem;
    text-align: center;
    color: var(--text-dim);
  }

  .field:first-child {
    border-right: 1px solid var(--border);
  }

  .field-label {
    display: block;
    font-size: 0.5rem;
    color: var(--null-color);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 1px;
  }

  /* Arrow between nodes */
  .arrow {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 0.3rem;
    color: var(--arrow-color);
    font-size: 1.4rem;
    animation: arrowAppear 0.4s ease-out 0.2s both;
  }

  @keyframes arrowAppear {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .arrow svg {
    width: 50px;
    height: 20px;
  }

  /* NULL terminator */
  .null-node {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--null-color);
    border: 2px dashed var(--null-color);
    border-radius: 8px;
    padding: 0.9rem 1.2rem;
    flex-shrink: 0;
    opacity: 0.7;
  }

  /* Console output */
  .console {
    background: #0a0d12;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #b0bec5;
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 1.5rem;
  }

  .console .prompt { color: var(--green); }
  .console .output { color: #e0e0e0; }

  /* Step counter */
  .step-counter {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  .step-counter span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Pain bar */
  .pain-bar-container {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    margin-top: 6px;
  }

  .pain-bar {
    height: 4px;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 2px solid;
  }

  .legend-swatch.head { border-color: var(--green); background: rgba(78,205,196,0.15); }
  .legend-swatch.new { border-color: var(--accent); background: rgba(255,107,107,0.15); }
  .legend-swatch.existing { border-color: var(--border); background: var(--surface2); }

  @media (max-width: 700px) {
    h1 { font-size: 1.2rem; }
    .step-btn { font-size: 0.65rem; padding: 0.4rem 0.7rem; }
    .node-box { min-width: 95px; }
    .list-area { padding: 1.5rem 0.8rem; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<header>
  <h1>🏥 ER Waiting Room — Linked List Visualizer</h1>
  <div class="subtitle">Singly-linked list sorted by pain level (descending)</div>
</header>

<div class="container">
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch head"></div> head node</div>
    <div class="legend-item"><div class="legend-swatch new"></div> newly inserted</div>
    <div class="legend-item"><div class="legend-swatch existing"></div> existing node</div>
  </div>

  <div class="step-nav" id="stepNav"></div>

  <div class="nav-arrows">
    <button class="arrow-btn" id="prevBtn" onclick="prevStep()">◀ Prev</button>
    <button class="arrow-btn" id="nextBtn" onclick="nextStep()">Next ▶</button>
  </div>

  <div class="step-counter">Step <span id="stepNum">0</span> of <span id="totalSteps">5</span></div>

  <div class="code-call" id="codeCall"></div>
  <div class="description" id="description"></div>

  <div class="list-area" id="listArea">
    <div class="head-label">head →</div>
  </div>

  <div class="console" id="console"></div>
</div>

<script>
const STEPS = [
  {
    label: 'Initial',
    code: '<span class="keyword">ERmanager</span> * waiting_room = <span class="keyword">new</span> ERmanager;',
    desc: 'Constructor called. <span class="highlight">head = NULL</span> — the waiting room is empty.',
    list: [],
    newIdx: -1,
    console: ['ERmanager created. head = NULL.']
  },
  {
    label: 'Jack (5)',
    code: 'waiting_room-><span class="keyword">check_in</span>(<span class="str">"Jack"</span>, <span class="num">5</span>);',
    desc: '<span class="highlight">Case 2: Empty list.</span> <span class="name-hl">Jack</span> with pain <span class="pain-hl">5</span> becomes the head. <code>newnode→next = NULL</code>.',
    list: [{name:'Jack', pain:5}],
    newIdx: 0,
    console: ['Jack (5) -> End of waiting room list for now!']
  },
  {
    label: 'Jose (6)',
    code: 'waiting_room-><span class="keyword">check_in</span>(<span class="str">"Jose"</span>, <span class="num">6</span>);',
    desc: '<span class="highlight">Case 3a: pain 6 > head pain 5.</span> <span class="name-hl">Jose</span> is inserted at the front. <code>newnode→next = head (Jack)</code>, then <code>head = newnode</code>.',
    list: [{name:'Jose', pain:6}, {name:'Jack', pain:5}],
    newIdx: 0,
    console: ['Jose 6', 'Jose (6) -> Jack (5) -> End of waiting room list for now!']
  },
  {
    label: 'Chris (10)',
    code: 'waiting_room-><span class="keyword">check_in</span>(<span class="str">"Chris"</span>, <span class="num">10</span>);',
    desc: '<span class="highlight">Case 3a: pain 10 > head pain 6.</span> <span class="name-hl">Chris</span> is inserted at the front. Highest pain = highest priority.',
    list: [{name:'Chris', pain:10}, {name:'Jose', pain:6}, {name:'Jack', pain:5}],
    newIdx: 0,
    console: ['Chris 10', 'Chris (10) -> Jose (6) -> Jack (5) -> End of waiting room list for now!']
  },
  {
    label: 'Mary (6)',
    code: 'waiting_room-><span class="keyword">check_in</span>(<span class="str">"Mary"</span>, <span class="num">6</span>);',
    desc: '<span class="highlight">Case 3b: Traverse to find position.</span> <span class="name-hl">Mary</span> (pain <span class="pain-hl">6</span>) walks past Chris(10) and Jose(6). Since <code>6 ≤ 6</code>, she lands <em>after</em> Jose but <em>before</em> Jack(5). FIFO among ties.',
    list: [{name:'Chris', pain:10}, {name:'Jose', pain:6}, {name:'Mary', pain:6}, {name:'Jack', pain:5}],
    newIdx: 2,
    console: ['Mary 6', 'Chris (10) -> Jose (6) -> Mary (6) -> Jack (5) -> End of waiting room list for now!']
  },
  {
    label: 'Jay (2)',
    code: 'waiting_room-><span class="keyword">check_in</span>(<span class="str">"Jay"</span>, <span class="num">2</span>);',
    desc: '<span class="highlight">Case 3b-ii: Append at end.</span> <span class="name-hl">Jay</span> (pain <span class="pain-hl">2</span>) has the lowest pain. Traverses the entire list and is appended at the tail. <code>newnode→next = NULL</code>.',
    list: [{name:'Chris', pain:10}, {name:'Jose', pain:6}, {name:'Mary', pain:6}, {name:'Jack', pain:5}, {name:'Jay', pain:2}],
    newIdx: 4,
    console: ['Jay 2', 'Chris (10) -> Jose (6) -> Mary (6) -> Jack (5) -> Jay (2) -> End of waiting room list for now!']
  }
];

let currentStep = 0;

function painColor(p) {
  if (p <= 2) return '#6c9bff';
  if (p <= 4) return '#4ecdc4';
  if (p <= 6) return '#ffe66d';
  if (p <= 8) return '#ffa64d';
  return '#ff6b6b';
}

function painClass(p) {
  return 'pain-' + p;
}

function renderStepNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<button class="step-btn ${i === currentStep ? 'active' : ''}" onclick="goToStep(${i})">${s.label}</button>`
  ).join('');
}

function renderList(step) {
  const area = document.getElementById('listArea');
  const s = STEPS[step];

  if (s.list.length === 0) {
    area.innerHTML = `<div class="head-label">head →</div><div class="empty-state">NULL — waiting room is empty</div>`;
    return;
  }

  let html = '<div class="head-label">head →</div>';

  s.list.forEach((node, i) => {
    const isNew = i === s.newIdx;
    const isHead = i === 0;
    const nextName = i < s.list.length - 1 ? s.list[i+1].name : 'NULL';
    const clz = isNew ? 'new-node' : (isHead ? 'head-node' : '');
    const col = painColor(node.pain);

    html += `
      <div class="node">
        <div class="node-box ${clz}">
          <div class="node-name">${node.name}</div>
          <div class="node-pain"><span class="${painClass(node.pain)}" style="color:${col}">${node.pain}</span> /10</div>
          <div class="pain-bar-container">
            <div class="pain-bar" style="width:${node.pain * 10}px; background:${col};"></div>
          </div>
          <div class="node-fields">
            <div class="field"><span class="field-label">data</span>${node.name}, ${node.pain}</div>
            <div class="field"><span class="field-label">next</span>${nextName === 'NULL' ? '<span style="color:var(--null-color)">NULL</span>' : '→ ' + nextName}</div>
          </div>
        </div>
      </div>
    `;

    // Arrow
    if (i < s.list.length - 1) {
      html += `
        <div class="arrow">
          <svg viewBox="0 0 50 20">
            <line x1="0" y1="10" x2="40" y2="10" stroke="#4a5568" stroke-width="2"/>
            <polygon points="40,5 50,10 40,15" fill="#4a5568"/>
          </svg>
        </div>
      `;
    } else {
      // Arrow to NULL
      html += `
        <div class="arrow">
          <svg viewBox="0 0 50 20">
            <line x1="0" y1="10" x2="40" y2="10" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,3"/>
            <polygon points="40,5 50,10 40,15" fill="#4a5568"/>
          </svg>
        </div>
        <div class="null-node">NULL</div>
      `;
    }
  });

  area.innerHTML = html;
}

function renderConsole(step) {
  const con = document.getElementById('console');
  const s = STEPS[step];
  con.innerHTML = s.console.map(line =>
    `<div><span class="prompt">$</span> <span class="output">${line}</span></div>`
  ).join('');
}

function render() {
  const s = STEPS[currentStep];
  renderStepNav();
  document.getElementById('stepNum').textContent = currentStep;
  document.getElementById('totalSteps').textContent = STEPS.length - 1;
  document.getElementById('codeCall').innerHTML = s.code;
  document.getElementById('description').innerHTML = s.desc;
  renderList(currentStep);
  renderConsole(currentStep);
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = currentStep === STEPS.length - 1;
}

function goToStep(i) { currentStep = i; render(); }
function prevStep() { if (currentStep > 0) { currentStep--; render(); } }
function nextStep() { if (currentStep < STEPS.length - 1) { currentStep++; render(); } }

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevStep();
  if (e.key === 'ArrowRight') nextStep();
});

render();
</script>
</body>
</html>
